<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>每日打卡工具</title>
<style>
:root{--bg:#0f0f0f;--card:#1a1a1a;--card2:#222;--border:#2a2a2a;--text:#e0e0e0;--text2:#999;--accent:#ff6b35;--accent2:#ff8c42;--green:#4caf84;--blue:#5b9bd5;--purple:#9b7ed8;--red:#e0556a;--yellow:#f0c040;--radius:14px;--radius-sm:10px;--font:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:130px;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:1.15rem;font-weight:700}.header select{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:18px;padding:6px 12px;font-size:0.85rem;font-family:var(--font);outline:none;max-width:130px}
.tabs{display:flex;gap:2px;padding:10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.82rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:var(--font)}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.panel{display:none;padding:0 14px 16px}.panel.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-weight:700;font-size:0.95rem;display:flex;align-items:center;gap:6px}
input,textarea,select{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:0.9rem;font-family:var(--font);outline:none;transition:border 0.2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:9px 18px;border-radius:22px;border:none;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:var(--font);white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:0.75rem;border-radius:16px}.btn-block{width:100%;padding:12px;font-size:0.95rem}.btn-danger{background:var(--red);color:#fff}
.stats-row{display:flex;gap:6px;margin-bottom:10px}.stat-card{flex:1;text-align:center;padding:10px 6px;background:var(--card2);border-radius:var(--radius-sm);border:1px solid var(--border)}.stat-card .val{font-size:1.3rem;font-weight:800}.stat-card .lbl{font-size:0.65rem;color:var(--text2);margin-top:1px}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.68rem;font-weight:600}
.tag-run{background:rgba(91,155,213,0.2);color:var(--blue)}.tag-workout{background:rgba(155,126,216,0.2);color:var(--purple)}.tag-rest{background:rgba(153,153,153,0.15);color:var(--text2)}
.checklist{list-style:none}.check-item{display:flex;align-items:flex-start;gap:8px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:2px;font-size:0;color:transparent}
.check-box.done{background:var(--green);border-color:var(--green);font-size:0.85rem;color:#fff;font-weight:700}
.check-body{flex:1;min-width:0}.check-title{font-weight:600;font-size:0.88rem}.check-desc{font-size:0.78rem;color:var(--text2);margin-top:2px;line-height:1.4}
.check-done .check-title{text-decoration:line-through;color:var(--text2)}.check-done .check-desc{opacity:0.5}
.input-row{display:flex;gap:6px;align-items:flex-end}.input-row>div{flex:1}
.summary-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,15,15,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.summary-text{font-size:0.82rem}.summary-text strong{color:var(--accent)}.summary-actions{display:flex;gap:6px}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}.modal h3{margin-bottom:10px}
label{display:block;font-size:0.75rem;color:var(--text2);margin-bottom:3px;font-weight:500}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}.text-sm{font-size:0.78rem;color:var(--text2)}.text-center{text-align:center}
.empty-state{text-align:center;padding:25px;color:var(--text2)}.empty-state .icon{font-size:2.2rem;margin-bottom:6px;display:block}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.progress-bar{height:5px;border-radius:3px;background:var(--border);margin-top:6px;overflow:hidden}.progress-fill{height:100%;border-radius:3px;background:var(--green);transition:width 0.3s}
.meal-plan-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid transparent}.meal-plan-card:hover{border-color:var(--border)}
.meal-plan-info{flex:1;min-width:0}.meal-plan-name{font-weight:600;font-size:0.85rem}.meal-plan-detail{font-size:0.75rem;color:var(--text2);margin-top:1px}.meal-plan-kcal{font-weight:700;color:var(--accent);font-size:0.9rem;white-space:nowrap}
.food-search-wrap{position:relative}.food-suggestions{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--card2);border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:180px;overflow-y:auto;display:none}.food-suggestions.show{display:block}
.food-suggestion-item{padding:9px 12px;cursor:pointer;font-size:0.85rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}.food-suggestion-item:hover{background:var(--card)}.food-suggestion-item .kcal-hint{color:var(--text2);font-size:0.75rem}
.macro-inline{font-size:0.72rem;color:var(--text2);margin-left:4px}.macro-inline span{margin-right:4px}.p{color:var(--blue)}.c{color:var(--yellow)}.f{color:var(--purple)}.kcal{color:var(--accent);font-weight:700}
.history-item{padding:10px 12px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:6px;border-left:3px solid var(--accent)}.history-date{font-size:0.75rem;color:var(--text2)}.history-summary{font-size:0.8rem;margin-top:3px;line-height:1.4}
</style></head><body>

<div class="header"><h1>&#x1F4CB; &#x6BCF;&#x65E5;&#x6253;&#x5361;</h1><select id="datePicker" onchange="onDateChange()"></select></div>
<div class="tabs" id="tabs">
  <button class="tab-btn active" data-tab="checklist">&#x2705; &#x4ECA;&#x65E5;&#x6253;&#x5361;</button>
  <button class="tab-btn" data-tab="meals">&#x1F37D; &#x996E;&#x98DF;</button>
  <button class="tab-btn" data-tab="workout">&#x1F3CB; &#x8BAD;&#x7EC3;</button>
  <button class="tab-btn" data-tab="body">&#x1F4CF; &#x8EAB;&#x4F53;</button>
  <button class="tab-btn" data-tab="history">&#x1F4CA; &#x5386;&#x53F2;</button>
</div>

<!-- CHECKLIST PANEL -->
<div class="panel active" id="panel-checklist">
  <div class="card" id="planCard">
    <div class="card-header"><span class="card-title"><span class="icon">&#x1F4C5;</span><span id="planDayLabel">&#x4ECA;&#x65E5;&#x8BA1;&#x5212;</span></span><span id="planWeekBadge"></span></div>
    <div id="planContent"><div class="empty-state"><span class="icon">&#x1F4ED;</span>&#x8BE5;&#x65E5;&#x671F;&#x6682;&#x65E0;&#x8BA1;&#x5212;</div></div>
    <div class="progress-bar mt-8"><div class="progress-fill" id="planProgress" style="width:0%"></div></div>
    <div class="text-sm mt-8" style="text-align:center" id="planProgressText">0/0 &#x5B8C;&#x6210;</div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title"><span class="icon">&#x270F;&#xFE0F;</span>&#x81EA;&#x7531;&#x8BB0;&#x5F55;</span></div>
    <div class="input-row"><input type="text" id="customCheckItem" placeholder="&#x6DFB;&#x52A0;&#x4E00;&#x6761;&#x6253;&#x5361;&#x9879;..."><button class="btn btn-primary btn-sm" onclick="addCustomCheck()" style="flex-shrink:0">&#x6DFB;&#x52A0;</button></div>
    <div id="customChecklist" class="mt-8"></div>
  </div>
</div>

<!-- MEALS PANEL -->
<div class="panel" id="panel-meals">
  <div class="stats-row">
    <div class="stat-card"><div class="val" id="statKcal" style="color:var(--accent)">0</div><div class="lbl">&#x5343;&#x5361;</div></div>
    <div class="stat-card"><div class="val" id="statProtein" style="color:var(--blue)">0g</div><div class="lbl">&#x86CB;&#x767D;&#x8D28;</div></div>
    <div class="stat-card"><div class="val" id="statCarb" style="color:var(--yellow)">0g</div><div class="lbl">&#x78B3;&#x6C34;</div></div>
    <div class="stat-card"><div class="val" id="statFat" style="color:var(--purple)">0g</div><div class="lbl">&#x8102;&#x80AA;</div></div>
  </div>
  <div class="card" id="mealPlanCard"><div class="card-header"><span class="card-title"><span class="icon">&#x1F4CB;</span>&#x4ECA;&#x65E5;&#x996E;&#x98DF;&#x8BA1;&#x5212;</span></div><div id="mealPlanList"></div></div>
  <div class="card">
    <div class="card-header"><span class="card-title"><span class="icon">&#x1F50D;</span>&#x641C;&#x7D22;&#x98DF;&#x7269;</span></div>
    <div class="food-search-wrap"><input type="text" id="foodSearch" placeholder="&#x8F93;&#x5165;&#x98DF;&#x7269;&#x540D;&#x79F0;..." autocomplete="off"><div class="food-suggestions" id="foodSuggestions"></div></div>
    <div class="row-2 mt-8"><div><label>&#x4EFD;&#x91CF;(g)</label><input type="number" id="foodWeight" value="100" min="0"></div><div><label>&#x9910;&#x522B;</label><select id="mealType"><option>&#x65E9;&#x9910;</option><option>&#x5348;&#x9910;</option><option>&#x665A;&#x9910;</option><option>&#x52A0;&#x9910;</option><option>&#x96F6;&#x98DF;</option></select></div></div>
    <button class="btn btn-primary btn-block mt-8" onclick="addFood()">&#x2795; &#x6DFB;&#x52A0;</button>
  </div>
  <div id="todayMeals"><div class="empty-state"><span class="icon">&#x1F37D;&#xFE0F;</span>&#x4ECA;&#x65E5;&#x65E0;&#x996E;&#x98DF;&#x8BB0;&#x5F55;</div></div>
</div>

<!-- WORKOUT PANEL -->
<div class="panel" id="panel-workout">
  <div class="card" id="workoutPlanCard"><div class="card-header"><span class="card-title"><span class="icon">&#x1F4CB;</span>&#x4ECA;&#x65E5;&#x8BAD;&#x7EC3;&#x8BA1;&#x5212;</span></div><div id="workoutPlanList"></div></div>
  <div class="card">
    <div class="card-header"><span class="card-title"><span class="icon">&#x2795;</span>&#x624B;&#x52A8;&#x8BB0;&#x5F55;&#x8BAD;&#x7EC3;</span></div>
    <div><label>&#x8BAD;&#x7EC3;&#x7C7B;&#x578B;</label><select id="workoutCategory"><option>&#x80F8;&#x90E8;</option><option>&#x80CC;&#x90E8;</option><option>&#x80A9;&#x90E8;</option><option>&#x624B;&#x81C2;</option><option>&#x817F;&#x90E8;</option><option>&#x6838;&#x5FC3;</option><option>&#x6709;&#x6C27;</option><option>&#x5168;&#x8EAB;</option><option>&#x5176;&#x4ED6;</option></select></div>
    <div class="mt-8"><label>&#x52A8;&#x4F5C;&#x540D;&#x79F0;</label><input type="text" id="workoutExName" placeholder="&#x5982;&#xFF1A;&#x6760;&#x94C3;&#x5367;&#x63A8;..." list="exList"><datalist id="exList"></datalist></div>
    <div class="row-3 mt-8" id="strengthFields"><div><label>&#x7EC4;&#x6570;</label><input type="number" id="workoutSets" min="0"></div><div><label>&#x6B21;&#x6570;</label><input type="number" id="workoutReps" min="0"></div><div><label>&#x91CD;&#x91CF;kg</label><input type="number" id="workoutWeight" min="0" step="0.5"></div></div>
    <div id="cardioFields" style="display:none"><div class="row-2 mt-8"><div><label>&#x65F6;&#x957F;(&#x5206;&#x949F;)</label><input type="number" id="workoutDuration" min="0"></div><div><label>&#x8DDD;&#x79BB;(km)</label><input type="number" id="workoutDistance" min="0" step="0.1"></div></div></div>
    <div class="mt-8"><label>&#x5907;&#x6CE8;</label><input type="text" id="workoutNote"></div>
    <button class="btn btn-primary btn-block mt-8" onclick="addWorkout()">&#x2795; &#x6DFB;&#x52A0;&#x8BAD;&#x7EC3;</button>
  </div>
  <div id="todayWorkouts"><div class="empty-state"><span class="icon">&#x1F3CB;&#xFE0F;</span>&#x4ECA;&#x65E5;&#x65E0;&#x8BAD;&#x7EC3;&#x8BB0;&#x5F55;</div></div>
</div>

<!-- BODY PANEL -->
<div class="panel" id="panel-body">
  <div class="card">
    <div class="card-header"><span class="card-title"><span class="icon">&#x1F4CF;</span>&#x8EAB;&#x4F53;&#x6570;&#x636E;</span></div>
    <div class="row-2"><div><label>&#x4F53;&#x91CD;(kg)</label><input type="number" id="bodyWeight" step="0.1" min="0"></div><div><label>&#x4F53;&#x8102;&#x7387;(%)</label><input type="number" id="bodyFat" step="0.1" min="0" max="60"></div></div>
    <div class="row-2 mt-8"><div><label>&#x8170;&#x56F4;(cm)</label><input type="number" id="bodyWaist" step="0.1" min="0"></div><div><label>&#x6668;&#x8109;</label><input type="number" id="bodyPulse" min="0"></div></div>
    <div class="row-2 mt-8"><div><label>&#x7761;&#x7720;(h)</label><input type="number" id="bodySleep" step="0.5" min="0" max="24"></div><div><label>&#x5B9E;&#x9645;&#x996E;&#x6C34;(L)</label><input type="number" id="bodyWater" step="0.1" min="0"></div></div>
    <div class="mt-8"><label>&#x819D;&#x76D6;&#x72B6;&#x6001;(0-10)</label><input type="range" id="bodyKnee" min="0" max="10" value="10" style="padding:0"><span id="kneeVal" class="text-sm">10</span></div>
    <button class="btn btn-primary btn-block mt-8" onclick="addBodyData()">&#x1F4BE; &#x4FDD;&#x5B58;</button>
  </div>
  <div id="bodyHistory"></div>
</div>

<!-- HISTORY PANEL -->
<div class="panel" id="panel-history">
  <div class="card"><div class="card-header"><span class="card-title"><span class="icon">&#x1F4CA;</span>&#x5386;&#x53F2;&#x8BB0;&#x5F55;</span><div style="display:flex;gap:6px"><button class="btn btn-sm btn-outline" onclick="exportData()">&#x1F4E4; &#x5BFC;&#x51FA;</button><button class="btn btn-sm btn-outline" onclick="showImport()">&#x1F4E5; &#x5BFC;&#x5165;</button></div></div></div>
  <div id="historyList"><div class="empty-state"><span class="icon">&#x1F4CA;</span>&#x6682;&#x65E0;&#x8BB0;&#x5F55;</div></div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar"><div class="summary-text"><span id="summaryContent">&#x4ECA;&#x5929; <strong>0 kcal</strong> &#xB7; 0/0 &#x5B8C;&#x6210;</span></div><div class="summary-actions"><button class="btn btn-sm btn-outline" onclick="switchTab('history')">&#x1F4CA;</button><button class="btn btn-sm btn-primary" onclick="exportData()">&#x1F4E4;</button></div></div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="importModal"><div class="modal"><h3>&#x1F4E5; &#x5BFC;&#x5165;&#x6570;&#x636E;</h3><p class="text-sm mb-8">&#x7C98;&#x8D34;&#x4E4B;&#x524D;&#x5BFC;&#x51FA;&#x7684; JSON &#x6062;&#x590D;&#x6570;&#x636E;</p><textarea id="importData"></textarea><div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-primary" onclick="doImport()" style="flex:1">&#x5BFC;&#x5165;</button><button class="btn btn-outline" onclick="hideImport()" style="flex:1">&#x53D6;&#x6D88;</button></div></div></div>

const SK = 'fit_v3';

function load(){ try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function save(d){ localStorage.setItem(SK,JSON.stringify(d)); }

function getToday(){ return (new Date()).toISOString().slice(0,10); }
let currentDate = getToday();

function getData(date){
  let d = load();
  if(!d[date]) d[date] = {checks:{},customChecks:[],meals:[],workouts:[],body:{}};
  return {all:d, today:d[date], date:date};
}

function saveData(date, td){
  let d = load();
  d[date] = td;
  save(d);
}

// ============================
// Build plan checklist
// ============================
function renderChecklist(){
  let td = getData(currentDate).today;
  let plan = DAILY_PLANS[currentDate];
  
  document.getElementById('planDayLabel').textContent = currentDate + (plan ? ' · '+plan.day : '');
  
  let items = [];
  
  if(plan){
    document.getElementById('planWeekBadge').innerHTML = '<span class="tag tag-workout">'+plan.week+'</span>';
    
    // Morning run
    if(plan.morning_run_plan && plan.morning_run_plan !== '休息' && plan.morning_run_plan !== ''){
      items.push({id:'morning_run', title:'🌅 晨跑: '+plan.morning_run_plan, desc:plan.morning_detail||''});
    }
    if(plan.morning_run_plan === '休息'){
      items.push({id:'morning_run', title:'🌅 晨跑: 休息日', desc:plan.morning_detail||'', rest:true});
    }
    
    // Warmup / knee prep
    items.push({id:'warmup', title:'🦵 跑前热身/护膝', desc:'蚌式开合、臀桥、动态热身'});
    
    // Evening workout
    let ev = plan.evening_workout_plan || '';
    if(ev && ev !== '休息' && ev !== '休息/备餐' && ev !== ''){
      items.push({id:'evening_workout', title:'🏋️ 晚练: '+ev, desc:getWorkoutDetail(ev)});
    }
    if(ev.includes('休息')){
      items.push({id:'evening_workout', title:'🏋️ 晚练: 休息', desc:'', rest:true});
    }
    
    // Post-run recovery
    items.push({id:'recovery', title:'🧊 跑后恢复', desc:'冷却、拉伸、必要时冰敷'});
    
    // Post-workout stretch
    items.push({id:'stretch', title:'🧘 练后拉伸', desc:'胸、背、肱三头肌、腹、臀各30s'});
    
    // Meals
    if(plan.breakfast) items.push({id:'meal_breakfast', title:'🍳 '+plan.breakfast, desc:getMealDetail(plan.breakfast)});
    if(plan.lunch) items.push({id:'meal_lunch', title:'🍱 '+plan.lunch, desc:getMealDetail(plan.lunch)});
    if(plan.dinner) items.push({id:'meal_dinner', title:'🍲 '+plan.dinner, desc:getMealDetail(plan.dinner)});
    if(plan.snack && !plan.snack.includes('可选')) items.push({id:'meal_snack', title:'🥛 '+plan.snack, desc:getMealDetail(plan.snack)});
    
    // Water
    items.push({id:'water', title:'💧 饮水: '+plan.water_goal, desc:''});
    
    // Calorie target
    items.push({id:'calorie_target', title:'🎯 热量目标: '+plan.calorie_target, desc:''});
  } else {
    document.getElementById('planWeekBadge').innerHTML = '';
  }
  
  // Always add some universal items
  if(!plan){
    items.push({id:'morning_run', title:'🌅 晨跑', desc:''});
    items.push({id:'workout_general', title:'🏋️ 训练', desc:''});
    items.push({id:'meal_breakfast', title:'🍳 早餐', desc:''});
    items.push({id:'meal_lunch', title:'🍱 午餐', desc:''});
    items.push({id:'meal_dinner', title:'🍲 晚餐', desc:''});
  }
  
  // Build HTML
  let checks = td.checks || {};
  let done = 0, total = items.length;
  let html = '<ul class="checklist">';
  items.forEach(item=>{
    let isDone = checks[item.id] === true;
    if(isDone) done++;
    let cls = isDone ? ' check-done' : '';
    let boxCls = isDone ? ' done' : '';
    html += '<li class="check-item'+cls+'" onclick="toggleCheck(\''+item.id+'\')">';
    html += '<div class="check-box'+boxCls+'">'+(isDone?'\u2713':'')+'</div>';
    html += '<div class="check-body"><div class="check-title">'+item.title+'</div>';
    if(item.desc) html += '<div class="check-desc">'+item.desc+'</div>';
    html += '</div></li>';
  });
  html += '</ul>';
  
  document.getElementById('planContent').innerHTML = html;
  document.getElementById('planProgress').style.width = total>0?(done/total*100)+'%':'0%';
  document.getElementById('planProgressText').textContent = done+'/'+total+' 完成'+(done===total&&total>0?' 🎉':'');
  
  renderCustomChecks();
  updateSummary();
}

function toggleCheck(id){
  let td = getData(currentDate).today;
  if(!td.checks) td.checks = {};
  td.checks[id] = !td.checks[id];
  saveData(currentDate, td);
  if(td.checks[id]) syncCheckToPanel(id);
  renderChecklist();
}

function syncCheckToPanel(id){
  if(!DAILY_PLANS[currentDate]) return;
  if(id.startsWith('meal_')) syncMealFromCheck();
  if(id==='evening_workout') syncWorkoutFromCheck();
}

function syncMealFromCheck(){
  let plan = DAILY_PLANS[currentDate];
  let td = getData(currentDate).today;
  let ch = td.checks || {};
  let map = {'meal_breakfast':plan.breakfast,'meal_lunch':plan.lunch,'meal_dinner':plan.dinner,'meal_snack':plan.snack};
  for(let cid in map){
    if(!ch[cid]||!map[cid]) continue;
    let m = map[cid].match(/(早餐|午餐|晚餐|加餐)[A-E]/);
    if(!m) continue;
    let code = m[0];
    if(td.meals.some(ml=>ml.code===code)) continue;
    let meal = MEAL_PLANS.find(x=>x.code===code);
    if(!meal) continue;
    let km=meal.info.match(/~(\d+)kcal/), pm=meal.info.match(/P(\d+)/), cm=meal.info.match(/C(\d+)/), fm=meal.info.match(/F(\d+)/);
    td.meals.push({id:Date.now()+Math.random(),name:meal.name,code:meal.code,weight:1,mealType:code.startsWith('早餐')?'早餐':code.startsWith('午餐')?'午餐':code.startsWith('晚餐')?'晚餐':'加餐',kcal:km?parseInt(km[1]):0,protein:pm?parseInt(pm[1]):0,carb:cm?parseInt(cm[1]):0,fat:fm?parseInt(fm[1]):0,ingredients:meal.ingredients,isPlanMeal:true});
    saveData(currentDate, td);
  }
}

function syncWorkoutFromCheck(){
  let plan = DAILY_PLANS[currentDate];
  let td = getData(currentDate).today;
  let ev = plan.evening_workout_plan||'';
  if(!ev||ev.includes('休息')||ev==='') return;
  if(td.workouts.some(w=>w.name===ev)) return;
  td.workouts.push({id:Date.now()+Math.random(),name:ev,category:'全身',sets:null,reps:null,weight:null,duration:null,distance:null,note:'按计划执行',isPlanWorkout:true});
  saveData(currentDate, td);
}

// Meal helpers
// ============================
function getMealDetail(codeStr){
  if(!codeStr) return '';
  // Extract meal code like "早餐A" or "午餐B"
  let m = codeStr.match(/(早餐|午餐|晚餐|加餐)[A-E]/);
  if(!m) return codeStr;
  let code = m[0];
  let meal = MEAL_PLANS.find(x=>x.code===code);
  if(meal) return meal.info + ' | ' + meal.ingredients;
  return codeStr;
}

function getWorkoutDetail(name){
  if(!name) return '';
  let wo = WORKOUT_PLANS.find(w=>w.name===name || name.includes(w.name));
  if(wo) return wo.content + ' ('+wo.note+')';
  return '';
}

// ============================
// Render meal plans for quick-add
// ============================
function renderMealPlans(){
  let plan = DAILY_PLANS[currentDate];
  if(!plan) { document.getElementById('mealPlanList').innerHTML = '<p class="text-sm">该日期无饮食计划</p>'; return; }
  
  let mealCodes = [];
  let extractCode = (s)=>{
    if(!s) return null;
    let m = s.match(/(早餐|午餐|晚餐|加餐)[A-E]/);
    return m ? m[0] : null;
  };
  
  [plan.breakfast, plan.lunch, plan.dinner, plan.snack].forEach(s=>{
    let c = extractCode(s);
    if(c) mealCodes.push(c);
  });
  
  if(mealCodes.length===0){
    document.getElementById('mealPlanList').innerHTML = '<p class="text-sm">该日期无饮食计划</p>';
    return;
  }
  
  document.getElementById('mealPlanList').innerHTML = mealCodes.map(code=>{
    let meal = MEAL_PLANS.find(m=>m.code===code);
    if(!meal) return '';
    return '<div class="meal-plan-card">'+
      '<div class="meal-plan-info"><div class="meal-plan-name">'+meal.code+' '+meal.name+'</div>'+
      '<div class="meal-plan-detail">'+meal.info+' | '+meal.ingredients+'</div></div>'+
      '<button class="btn btn-sm btn-primary" onclick="quickAddMeal(\''+code+'\')">+添加</button></div>';
  }).join('');
}

function quickAddMeal(code){
  let meal = MEAL_PLANS.find(m=>m.code===code);
  if(!meal) return;
  
  // Parse kcal from info string like "~420kcal / P28 C42 F14 / ~6元"
  let kcalMatch = meal.info.match(/~(\d+)kcal/);
  let pMatch = meal.info.match(/P(\d+)/);
  let cMatch = meal.info.match(/C(\d+)/);
  let fMatch = meal.info.match(/F(\d+)/);
  
  let td = getData(currentDate).today;
  td.meals.push({
    id: Date.now(),
    name: meal.name,
    code: meal.code,
    weight: 1,  // 1 serving
    mealType: meal.code.startsWith('早餐')?'早餐':meal.code.startsWith('午餐')?'午餐':meal.code.startsWith('晚餐')?'晚餐':'加餐',
    kcal: kcalMatch?parseInt(kcalMatch[1]):0,
    protein: pMatch?parseInt(pMatch[1]):0,
    carb: cMatch?parseInt(cMatch[1]):0,
    fat: fMatch?parseInt(fMatch[1]):0,
    ingredients: meal.ingredients,
    isPlanMeal: true
  });
  saveData(currentDate, td);
  renderMeals();
  updateSummary();
}

function renderBodyHistory(){
  let d = load();
  let entries = Object.entries(d).filter(([dt,dd])=>dd.body&&dd.body.weight).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10);
  let container = document.getElementById('bodyHistory');
  
  if(entries.length===0){
    container.innerHTML = '<div class="card mt-12"><div class="empty-state"><span class="icon">\uD83D\uDCCF</span>暂无身体数据</div></div>';
  } else {
    let html = '<div class="card mt-12"><div class="card-header"><span class="card-title"><span class="icon">\uD83D\uDCC8</span>最近记录</span></div>';
    entries.forEach(([date,dd])=>{
      let b = dd.body;
      let parts = ['\u4F53\u91CD <strong>'+b.weight+'kg</strong>'];
      if(b.fat) parts.push('\u4F53\u8102 '+b.fat+'%');
      if(b.waist) parts.push('\u8170\u56F4 '+b.waist+'cm');
      if(b.sleep) parts.push('\u7761\u7720 '+b.sleep+'h');
      if(b.water) parts.push('\u996E\u6C34 '+b.water+'L');
      if(b.pulse) parts.push('\u6668\u8109 '+b.pulse);
      if(b.knee!=null) parts.push('\u819D\u76D6 '+b.knee+'/10');
      html += '<div class="history-item"><div class="history-date">'+date+'</div><div class="history-summary">'+parts.join(' \u00B7 ')+'</div></div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }
}

// ============================
// History
// ============================
function renderHistory(){
  let d = load();
  let dates = Object.keys(d).sort().reverse().slice(0,30);
  let container = document.getElementById('historyList');
  if(dates.length===0){
    container.innerHTML = '<div class="empty-state"><span class="icon">\uD83D\uDCCA</span>暂无记录</div>';
  } else {
    container.innerHTML = dates.map(date=>{
      let dd = d[date];
      let totalKcal = dd.meals?dd.meals.reduce((s,m)=>s+m.kcal,0):0;
      let woCount = dd.workouts?dd.workouts.length:0;
      let checks = dd.checks||{};
      let checkDone = Object.values(checks).filter(v=>v===true).length;
      let checkTotal = Object.keys(checks).length;
      let summary = [];
      if(checkTotal>0) summary.push('\u2705 '+checkDone+'/'+checkTotal);
      if(totalKcal>0) summary.push('\uD83C\uDF7D '+totalKcal+'kcal');
      if(woCount>0) summary.push('\uD83C\uDFCB '+woCount+'\u52A8\u4F5C');
      if(dd.body&&dd.body.weight) summary.push('\u2696 '+dd.body.weight+'kg');
      let isToday = date===getToday();
      return '<div class="history-item" style="border-left-color:'+(isToday?'var(--accent)':'var(--border)')+'">'+
        '<div class="history-date">'+date+(isToday?' <span style="color:var(--accent);font-weight:600">(\u4ECA\u5929)</span>':'')+'</div>'+
        '<div class="history-summary">'+(summary.join(' \u00B7 ')||'\u65E0\u8BB0\u5F55')+'</div></div>';
    }).join('');
  }
}

// ============================
// Summary bar
// ============================
function updateSummary(){
  let td = getData(currentDate).today;
  let totalKcal = td.meals?td.meals.reduce((s,m)=>s+m.kcal,0):0;
  let checks = td.checks||{};
  let done = Object.values(checks).filter(v=>v===true).length;
  let total = Object.keys(checks).length;
  let customDone = (td.customChecks||[]).filter(c=>c.done).length;
  done += customDone; total += (td.customChecks||[]).length;
  document.getElementById('summaryContent').innerHTML = '\u4ECA\u5929 <strong>'+totalKcal+' kcal</strong> \u00B7 '+done+'/'+total+' \u5B8C\u6210';
}

// ============================
// Export / Import
// ============================
function exportData(){
  let data = load();
  let blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = '\u6253\u5361\u6570\u636E\u5907\u4EFD_'+getToday()+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function showImport(){
  document.getElementById('importModal').classList.add('show');
}

function hideImport(){
  document.getElementById('importModal').classList.remove('show');
  document.getElementById('importData').value='';
}

function doImport(){
  try{
    let imported = JSON.parse(document.getElementById('importData').value);
    if(typeof imported!=='object') throw new Error();
    let existing = load();
    save({...existing, ...imported});
    hideImport();
    renderAll();
  }catch(e){
    alert('\u5BFC\u5165\u5931\u8D25\uFF1A\u6570\u636E\u683C\u5F0F\u4E0D\u6B63\u786E');
  }
}

document.getElementById('importModal').addEventListener('click', e=>{
  if(e.target===e.currentTarget) hideImport();
});

// ============================
// Init
// ============================
function renderAll(){
  initDatePicker();
  renderChecklist();
  renderMeals();
  renderWorkouts();
  renderBodyHistory();
  renderHistory();
  updateSummary();
  initFoodSearch();
}

renderAll();
</script>
