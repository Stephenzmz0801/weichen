<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>每日打卡工具</title>
<style>
:root{--bg:#0f0f0f;--card:#1a1a1a;--card2:#222;--border:#2a2a2a;--text:#e0e0e0;--text2:#999;--accent:#ff6b35;--accent2:#ff8c42;--green:#4caf84;--blue:#5b9bd5;--purple:#9b7ed8;--red:#e0556a;--yellow:#f0c040;--radius:14px;--radius-sm:10px;--font:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:140px;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:1.15rem;font-weight:700}.header select{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:18px;padding:6px 12px;font-size:0.85rem;font-family:var(--font);outline:none;max-width:130px}
.tabs{display:flex;gap:2px;padding:10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.82rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:var(--font)}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.panel{display:none;padding:0 14px 16px}.panel.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-weight:700;font-size:0.95rem;display:flex;align-items:center;gap:6px}
input,textarea,select{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:0.9rem;font-family:var(--font);outline:none;transition:border 0.2s;appearance:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:9px 18px;border-radius:22px;border:none;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:var(--font);white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:0.75rem;border-radius:16px}.btn-block{width:100%;padding:12px;font-size:0.95rem}.btn-danger{background:var(--red);color:#fff}
.stats-row{display:flex;gap:6px;margin-bottom:10px}.stat-card{flex:1;text-align:center;padding:10px 6px;background:var(--card2);border-radius:var(--radius-sm);border:1px solid var(--border)}.stat-card .val{font-size:1.3rem;font-weight:800}.stat-card .lbl{font-size:0.65rem;color:var(--text2);margin-top:1px}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.68rem;font-weight:600}
.tag-run{background:rgba(91,155,213,0.2);color:var(--blue)}.tag-workout{background:rgba(155,126,216,0.2);color:var(--purple)}.tag-rest{background:rgba(153,153,153,0.15);color:var(--text2)}
.checklist{list-style:none}.check-item{display:flex;align-items:flex-start;gap:8px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:2px;font-size:0;color:transparent}
.check-box.done{background:var(--green);border-color:var(--green);font-size:0.85rem;color:#fff;font-weight:700}
.check-body{flex:1;min-width:0}.check-title{font-weight:600;font-size:0.88rem}.check-desc{font-size:0.78rem;color:var(--text2);margin-top:2px;line-height:1.4}
.check-done .check-title{text-decoration:line-through;color:var(--text2)}.check-done .check-desc{opacity:0.5}
.input-row{display:flex;gap:6px;align-items:flex-end}.input-row>div{flex:1}
.summary-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,15,15,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.summary-text{font-size:0.82rem}.summary-text strong{color:var(--accent)}.summary-actions{display:flex;gap:6px}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}.modal h3{margin-bottom:10px}
label{display:block;font-size:0.75rem;color:var(--text2);margin-bottom:3px;font-weight:500}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}.text-sm{font-size:0.78rem;color:var(--text2)}.text-center{text-align:center}
.empty-state{text-align:center;padding:25px;color:var(--text2)}.empty-state .icon{font-size:2.2rem;margin-bottom:6px;display:block}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.progress-bar{height:5px;border-radius:3px;background:var(--border);margin-top:6px;overflow:hidden}.progress-fill{height:100%;border-radius:3px;background:var(--green);transition:width 0.3s}
.meal-plan-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid transparent}.meal-plan-card:hover{border-color:var(--border)}
.meal-plan-info{flex:1;min-width:0}.meal-plan-name{font-weight:600;font-size:0.85rem}.meal-plan-detail{font-size:0.75rem;color:var(--text2);margin-top:1px}.meal-plan-kcal{font-weight:700;color:var(--accent);font-size:0.9rem;white-space:nowrap}
.food-search-wrap{position:relative}.food-suggestions{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--card2);border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:180px;overflow-y:auto;display:none}.food-suggestions.show{display:block}
.food-suggestion-item{padding:9px 12px;cursor:pointer;font-size:0.85rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}.food-suggestion-item:hover{background:var(--card)}.food-suggestion-item .kcal-hint{color:var(--text2);font-size:0.75rem}
.macro-inline{font-size:0.72rem;color:var(--text2);margin-left:4px}.macro-inline span{margin-right:4px}.p{color:var(--blue)}.c{color:var(--yellow)}.f{color:var(--purple)}
.history-item{padding:10px 12px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:6px;border-left:3px solid var(--accent)}.history-date{font-size:0.75rem;color:var(--text2)}.history-summary{font-size:0.8rem;margin-top:3px;line-height:1.4}
.deficit-positive{color:var(--green)}.deficit-negative{color:var(--red)}
</style></head><body>

<div class="header"><h1>&#x1F4CB; &#x6BCF;&#x65E5;&#x6253;&#x5361;</h1><select id="datePicker" onchange="onDateChange()"></select></div>
<div class="tabs" id="tabs">
  <button class="tab-btn active" data-tab="checklist">&#x2705; &#x6253;&#x5361;</button>
  <button class="tab-btn" data-tab="meals">&#x1F37D; &#x996E;&#x98DF;</button>
  <button class="tab-btn" data-tab="workout">&#x1F3CB; &#x8BAD;&#x7EC3;</button>
  <button class="tab-btn" data-tab="body">&#x1F4CF; &#x8EAB;&#x4F53;</button>
  <button class="tab-btn" data-tab="history">&#x1F4CA; &#x5386;&#x53F2;</button>
</div>

<!-- CHECKLIST -->
<div class="panel active" id="panel-checklist">
  <div class="card">
    <div class="card-header"><span class="card-title"><span class="icon">&#x1F4C5;</span><span id="planDayLabel">&#x4ECA;&#x65E5;&#x8BA1;&#x5212;</span></span><span id="planWeekBadge"></span></div>
    <div id="planContent"><div class="empty-state">&#x8BE5;&#x65E5;&#x671F;&#x6682;&#x65E0;&#x8BA1;&#x5212;</div></div>
    <div class="progress-bar mt-8"><div class="progress-fill" id="planProgress" style="width:0%"></div></div>
    <div class="text-sm mt-8 text-center" id="planProgressText">0/0 &#x5B8C;&#x6210;</div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">&#x270F;&#xFE0F; &#x81EA;&#x7531;&#x8BB0;&#x5F55;</span></div>
    <div class="input-row"><input type="text" id="customCheckItem" placeholder="&#x6DFB;&#x52A0;&#x6253;&#x5361;&#x9879;..."><button class="btn btn-primary btn-sm" onclick="addCustomCheck()">&#x6DFB;&#x52A0;</button></div>
    <div id="customChecklist" class="mt-8"></div>
  </div>
</div>

<!-- MEALS -->
<div class="panel" id="panel-meals">
  <div class="stats-row">
    <div class="stat-card"><div class="val" id="statKcal" style="color:var(--accent)">0</div><div class="lbl">&#x6444;&#x5165; kcal</div></div>
    <div class="stat-card"><div class="val" id="statBurn" style="color:var(--blue)">0</div><div class="lbl">&#x6D88;&#x8017; kcal</div></div>
    <div class="stat-card"><div class="val" id="statDeficit" style="color:var(--green)">0</div><div class="lbl">&#x5DEE;&#x989D;</div></div>
    <div class="stat-card"><div class="val" id="statProtein" style="color:var(--purple)">0g</div><div class="lbl">&#x86CB;&#x767D;&#x8D28;</div></div>
  </div>
  <div class="card" id="mealPlanCard"><div class="card-header"><span class="card-title">&#x1F4CB; &#x4ECA;&#x65E5;&#x996E;&#x98DF;&#x8BA1;&#x5212;</span></div><div id="mealPlanList"></div></div>
  <div class="card">
    <div class="card-header"><span class="card-title">&#x1F50D; &#x641C;&#x7D22;&#x98DF;&#x7269;</span></div>
    <div class="food-search-wrap"><input type="text" id="foodSearch" placeholder="&#x8F93;&#x5165;&#x98DF;&#x7269;&#x540D;&#x79F0;..." autocomplete="off"><div class="food-suggestions" id="foodSuggestions"></div></div>
    <div class="row-2 mt-8"><div><label>&#x4EFD;&#x91CF;(g)</label><input type="number" id="foodWeight" value="100"></div><div><label>&#x9910;&#x522B;</label><select id="mealType"><option>&#x65E9;&#x9910;</option><option>&#x5348;&#x9910;</option><option>&#x665A;&#x9910;</option><option>&#x52A0;&#x9910;</option><option>&#x96F6;&#x98DF;</option></select></div></div>
    <button class="btn btn-primary btn-block mt-8" onclick="addFood()">&#x2795; &#x6DFB;&#x52A0;</button>
  </div>
  <div id="todayMeals"><div class="empty-state">&#x4ECA;&#x65E5;&#x65E0;&#x996E;&#x98DF;&#x8BB0;&#x5F55;</div></div>
</div>

<!-- WORKOUT -->
<div class="panel" id="panel-workout">
  <div class="card" id="workoutPlanCard"><div class="card-header"><span class="card-title">&#x1F4CB; &#x8BAD;&#x7EC3;&#x8BA1;&#x5212;</span></div><div id="workoutPlanList"></div></div>
  <div class="card">
    <div class="card-header"><span class="card-title">&#x2795; &#x624B;&#x52A8;&#x8BB0;&#x5F55;</span></div>
    <div><label>&#x7C7B;&#x578B;</label><select id="workoutCategory"><option>&#x80F8;&#x90E8;</option><option>&#x80CC;&#x90E8;</option><option>&#x80A9;&#x90E8;</option><option>&#x624B;&#x81C2;</option><option>&#x817F;&#x90E8;</option><option>&#x6838;&#x5FC3;</option><option>&#x6709;&#x6C27;</option><option>&#x5168;&#x8EAB;</option><option>&#x5176;&#x4ED6;</option></select></div>
    <div class="mt-8"><label>&#x52A8;&#x4F5C;&#x540D;&#x79F0;</label><input type="text" id="workoutExName" placeholder="&#x6760;&#x94C3;&#x5367;&#x63A8;..." list="exList"><datalist id="exList"></datalist></div>
    <div class="row-3 mt-8" id="strengthFields"><div><label>&#x7EC4;&#x6570;</label><input type="number" id="workoutSets"></div><div><label>&#x6B21;&#x6570;</label><input type="number" id="workoutReps"></div><div><label>&#x91CD;&#x91CF;kg</label><input type="number" id="workoutWeight" step="0.5"></div></div>
    <div id="cardioFields" style="display:none"><div class="row-2 mt-8"><div><label>&#x65F6;&#x957F;(&#x5206;)</label><input type="number" id="workoutDuration"></div><div><label>&#x8DDD;&#x79BB;(km)</label><input type="number" id="workoutDistance" step="0.1"></div></div></div>
    <div class="mt-8"><label>&#x5907;&#x6CE8;</label><input type="text" id="workoutNote"></div>
    <div class="mt-8"><label>&#x4F30;&#x7B97;&#x6D88;&#x8017;(kcal)</label><input type="number" id="workoutCalBurn" placeholder="&#x81EA;&#x52A8;&#x8BA1;&#x7B97;&#x6216;&#x624B;&#x52A8;&#x8F93;&#x5165;"></div>
    <button class="btn btn-primary btn-block mt-8" onclick="addWorkout()">&#x2795; &#x6DFB;&#x52A0;</button>
  </div>
  <div id="todayWorkouts"><div class="empty-state">&#x4ECA;&#x65E5;&#x65E0;&#x8BAD;&#x7EC3;</div></div>
</div>

<!-- BODY -->
<div class="panel" id="panel-body">
  <div class="card"><div class="card-header"><span class="card-title">&#x1F4CF; &#x8EAB;&#x4F53;&#x6570;&#x636E;</span></div>
    <div class="row-2"><div><label>&#x4F53;&#x91CD;(kg)</label><input type="number" id="bodyWeight" step="0.1"></div><div><label>&#x4F53;&#x8102;(%)</label><input type="number" id="bodyFat" step="0.1"></div></div>
    <div class="row-2 mt-8"><div><label>&#x8170;&#x56F4;(cm)</label><input type="number" id="bodyWaist" step="0.1"></div><div><label>&#x6668;&#x8109;</label><input type="number" id="bodyPulse"></div></div>
    <div class="row-2 mt-8"><div><label>&#x7761;&#x7720;(h)</label><input type="number" id="bodySleep" step="0.5"></div><div><label>&#x996E;&#x6C34;(L)</label><input type="number" id="bodyWater" step="0.1"></div></div>
    <div class="mt-8"><label>&#x819D;&#x76D6;(0-10)</label><input type="range" id="bodyKnee" min="0" max="10" value="10"><span id="kneeVal" class="text-sm">10</span></div>
    <button class="btn btn-primary btn-block mt-8" onclick="addBodyData()">&#x1F4BE; &#x4FDD;&#x5B58;</button>
  </div>
  <div id="bodyHistory"></div>
</div>

<!-- HISTORY -->
<div class="panel" id="panel-history">
  <div class="card"><div class="card-header"><span class="card-title">&#x1F4CA; &#x5386;&#x53F2;</span><div><button class="btn btn-sm btn-outline" onclick="exportData()">&#x1F4E4;</button><button class="btn btn-sm btn-outline" onclick="showImport()">&#x1F4E5;</button></div></div></div>
  <div id="historyList"><div class="empty-state">&#x6682;&#x65E0;&#x8BB0;&#x5F55;</div></div>
</div>

<div class="summary-bar"><div class="summary-text" id="summaryContent">&#x4ECA;&#x5929; <strong>0 kcal</strong></div><div class="summary-actions"><button class="btn btn-sm btn-outline" onclick="switchTab('history')">&#x1F4CA;</button><button class="btn btn-sm btn-primary" onclick="exportData()">&#x1F4E4;</button></div></div>

<div class="modal-overlay" id="importModal"><div class="modal"><h3>&#x1F4E5; &#x5BFC;&#x5165;</h3><p class="text-sm mb-8">&#x7C98;&#x8D34;JSON&#x6570;&#x636E;</p><textarea id="importData"></textarea><div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-primary" onclick="doImport()" style="flex:1">&#x5BFC;&#x5165;</button><button class="btn btn-outline" onclick="hideImport()" style="flex:1">&#x53D6;&#x6D88;</button></div></div></div>

const SK='fit_v4';
function load(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function save(d){localStorage.setItem(SK,JSON.stringify(d));}
function getToday(){return(new Date()).toISOString().slice(0,10);}
let currentDate=getToday();
function getData(date){let d=load();if(!d[date])d[date]={checks:{},customChecks:[],meals:[],workouts:[],body:{}};return{all:d,today:d[date],date:date};}
function saveData(date,td){let d=load();d[date]=td;save(d);}

// Tab switch
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  let btn=document.querySelector('.tab-btn[data-tab="'+name+'"]');
  if(btn)btn.classList.add('active');
  let panel=document.getElementById('panel-'+name);
  if(panel)panel.classList.add('active');
  if(name==='checklist')renderAll();
  if(name==='meals')renderAll();
  if(name==='workout')renderAll();
  if(name==='body')renderBodyHistory();
  if(name==='history')renderHistory();
}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.classList.contains('tab-btn'))switchTab(e.target.dataset.tab);});

// Date picker
function initDatePicker(){
  let sel=document.getElementById('datePicker');
  sel.innerHTML=PLAN_DATES.map(d=>'<option value="'+d+'"'+(d===currentDate?' selected':'')+'>'+d.slice(5)+'</option>').join('');
}
function onDateChange(){currentDate=document.getElementById('datePicker').value;renderAll();}

// =========== CALORIE HELPERS ===========
function calcWorkoutBurn(wo){
  if(wo.calBurn)return wo.calBurn;
  if(!wo.duration||wo.duration<=0)return 0;
  let rate=CAL_BURN_RATE[wo.name]||CAL_BURN_RATE['力量训练']||4.5;
  let weight=68;
  let td=getData(currentDate).today;
  if(td.body&&td.body.weight)weight=td.body.weight;
  return Math.round(rate*weight*wo.duration/60);
}

function getTotalKcal(){let td=getData(currentDate).today;return td.meals.reduce((s,m)=>s+(m.kcal||0),0);}
function getTotalBurn(){let td=getData(currentDate).today;return td.workouts.reduce((s,w)=>s+calcWorkoutBurn(w),0);}
function getTotalProtein(){let td=getData(currentDate).today;return td.meals.reduce((s,m)=>s+(m.protein||0),0);}

// =========== RENDER ALL (main entry) ===========
function renderAll(){
  initDatePicker();
  renderChecklist();
  renderCustomChecks();
  renderMealPlans();
  renderMeals();
  renderWorkoutPlans();
  renderWorkouts();
  updateSummary();
}


// =========== CHECKLIST ===========
function renderChecklist(){
  let td=getData(currentDate).today;
  let plan=DAILY_PLANS[currentDate];
  document.getElementById('planDayLabel').textContent=currentDate+(plan?' '+plan.day:'');
  
  // Build check items - they represent the PLAN, but completion state comes from DATA
  let items=[];
  if(plan){
    document.getElementById('planWeekBadge').innerHTML='<span class="tag tag-workout">'+plan.week+'</span>';
    
    if(plan.morning_run_plan&&plan.morning_run_plan!=='休息'&&plan.morning_run_plan!==''){
      items.push({id:'morning_run',title:plan.morning_run_plan,desc:plan.morning_detail||''});
    } else if(plan.morning_run_plan==='休息'){
      items.push({id:'morning_run',title:'休息日',desc:plan.morning_detail||'',rest:true});
    }
    
    items.push({id:'warmup',title:'跑前热身/护膝',desc:'蚌式开合x15/侧,臀桥x12,动态热身'});
    
    let ev=plan.evening_workout_plan||'';
    if(ev&&!ev.includes('休息')&&ev!==''){
      let wo=WORKOUT_PLANS.find(w=>ev.includes(w.name));
      items.push({id:'evening_workout',title:ev,desc:wo?wo.content+' ('+wo.note+')':''});
    } else if(ev.includes('休息')){
      items.push({id:'evening_workout',title:'晚练休息',desc:'',rest:true});
    }
    
    items.push({id:'recovery',title:'跑后恢复',desc:'冷却步行,拉伸,必要时冰敷'});
    items.push({id:'stretch',title:'练后拉伸',desc:'胸背肱三腹臀各30s'});
    
    if(plan.breakfast)items.push({id:'meal_breakfast',title:plan.breakfast,desc:getMealDesc(plan.breakfast)});
    if(plan.lunch)items.push({id:'meal_lunch',title:plan.lunch,desc:getMealDesc(plan.lunch)});
    if(plan.dinner)items.push({id:'meal_dinner',title:plan.dinner,desc:getMealDesc(plan.dinner)});
    if(plan.snack&&!plan.snack.includes('可选'))items.push({id:'meal_snack',title:plan.snack,desc:getMealDesc(plan.snack)});
    
    items.push({id:'water',title:'饮水:'+plan.water_goal,desc:''});
    items.push({id:'calorie_target',title:'热量目标:'+plan.calorie_target,desc:''});
  }
  
  let allChecks=buildCheckState(items);
  let done=0,total=allChecks.length;
  let html='<ul class="checklist">';
  allChecks.forEach(c=>{
    if(c.done)done++;
    html+='<li class="check-item'+(c.done?' check-done':'')+'" onclick="toggleCheck(\''+c.id+'\')">';
    html+='<div class="check-box'+(c.done?' done':'')+'">'+(c.done?'\u2713':'')+'</div>';
    html+='<div class="check-body"><div class="check-title">'+c.title+'</div>';
    if(c.desc)html+='<div class="check-desc">'+c.desc+'</div>';
    html+='</div></li>';
  });
  html+='</ul>';
  document.getElementById('planContent').innerHTML=html;
  document.getElementById('planProgress').style.width=total>0?(done/total*100)+'%':'0%';
  document.getElementById('planProgressText').textContent=done+'/'+total+' 完成'+(done===total&&total>0?' \uD83C\uDF89':'');
}

function getMealDesc(codeStr){
  if(!codeStr)return'';
  let m=codeStr.match(/(早餐|午餐|晚餐|加餐)[A-E]/);
  if(!m)return codeStr;
  let meal=MEAL_PLANS.find(x=>x.code===m[0]);
  if(meal)return meal.info+' | '+meal.ingredients;
  return codeStr;
}

// BuildCheckState - computes done state from DATA (meals/workouts recorded)
function buildCheckState(items){
  let td=getData(currentDate).today;
  let checks=td.checks||{};
  return items.map(item=>{
    // Auto-detect from data
    let done=checks[item.id]===true;
    if(!done){
      if(item.id==='meal_breakfast'&&td.meals.some(m=>m.mealType==='早餐'))done=true;
      if(item.id==='meal_lunch'&&td.meals.some(m=>m.mealType==='午餐'))done=true;
      if(item.id==='meal_dinner'&&td.meals.some(m=>m.mealType==='晚餐'))done=true;
      if(item.id==='meal_snack'&&td.meals.some(m=>m.mealType==='加餐'))done=true;
      if(item.id==='evening_workout'&&td.workouts.length>0)done=true;
    }
    return{id:item.id,title:item.title,desc:item.desc||'',done:done};
  });
}

function toggleCheck(id){
  let td=getData(currentDate).today;
  if(!td.checks)td.checks={};
  td.checks[id]=!(td.checks[id]===true);
  saveData(currentDate,td);
  // If checking ON: sync to meals/workouts
  if(td.checks[id])syncCheckToData(id);
  renderAll();
}

// Sync: when checkbox is toggled ON, add corresponding data
function syncCheckToData(id){
  let plan=DAILY_PLANS[currentDate];
  if(!plan)return;
  let td=getData(currentDate).today;
  
  if(id==='meal_breakfast')syncMealFromPlan('早餐',plan.breakfast);
  if(id==='meal_lunch')syncMealFromPlan('午餐',plan.lunch);
  if(id==='meal_dinner')syncMealFromPlan('晚餐',plan.dinner);
  if(id==='meal_snack')syncMealFromPlan('加餐',plan.snack);
  if(id==='evening_workout')syncWorkoutFromPlan(plan.evening_workout_plan);
}

function syncMealFromPlan(mealType,mealStr){
  if(!mealStr)return;
  let m=mealStr.match(/(早餐|午餐|晚餐|加餐)[A-E]/);
  if(!m)return;
  let code=m[0];
  let td=getData(currentDate).today;
  if(td.meals.some(ml=>ml.code===code))return;
  let meal=MEAL_PLANS.find(x=>x.code===code);
  if(!meal)return;
  let km=meal.info.match(/~(\d+)kcal/),pm=meal.info.match(/P(\d+)/),cm=meal.info.match(/C(\d+)/),fm=meal.info.match(/F(\d+)/);
  td.meals.push({id:Date.now(),name:meal.name,code:code,weight:1,mealType:mealType,kcal:km?parseInt(km[1]):0,protein:pm?parseInt(pm[1]):0,carb:cm?parseInt(cm[1]):0,fat:fm?parseInt(fm[1]):0,ingredients:meal.ingredients,isPlanMeal:true});
  saveData(currentDate,td);
}

function syncWorkoutFromPlan(ev){
  if(!ev||ev.includes('休息')||ev==='')return;
  let td=getData(currentDate).today;
  if(td.workouts.some(w=>w.name===ev))return;
  td.workouts.push({id:Date.now(),name:ev,category:'全身',sets:null,reps:null,weight:null,duration:30,distance:null,note:'按计划执行',calBurn:null,isPlanWorkout:true});
  saveData(currentDate,td);
}

// =========== CUSTOM CHECKS ===========
function addCustomCheck(){
  let input=document.getElementById('customCheckItem');
  let text=input.value.trim();if(!text)return;
  let td=getData(currentDate).today;
  if(!td.customChecks)td.customChecks=[];
  td.customChecks.push({id:'c'+Date.now(),text:text,done:false});
  saveData(currentDate,td);
  input.value='';renderCustomChecks();updateSummary();
}
function toggleCustomCheck(id){
  let td=getData(currentDate).today;
  let item=td.customChecks.find(c=>c.id===id);
  if(item){item.done=!item.done;saveData(currentDate,td);renderCustomChecks();updateSummary();}
}
function deleteCustomCheck(id){
  let td=getData(currentDate).today;
  td.customChecks=td.customChecks.filter(c=>c.id!==id);
  saveData(currentDate,td);renderCustomChecks();updateSummary();
}
function renderCustomChecks(){
  let td=getData(currentDate).today;
  let items=td.customChecks||[];
  document.getElementById('customChecklist').innerHTML=items.map(item=>
    '<div class="check-item'+(item.done?' check-done':'')+'" style="cursor:pointer">'+
    '<div class="check-box'+(item.done?' done':'')+'" onclick="toggleCustomCheck(\''+item.id+'\')">'+(item.done?'\u2713':'')+'</div>'+
    '<div class="check-body" onclick="toggleCustomCheck(\''+item.id+'\')"><div class="check-title">'+item.text+'</div></div>'+
    '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteCustomCheck(\''+item.id+'\')">\u2715</button></div>'
  ).join('');
}


// =========== MEALS ===========
function renderMealPlans(){
  let plan=DAILY_PLANS[currentDate];
  if(!plan){document.getElementById('mealPlanList').innerHTML='';return;}
  let codes=[];
  [plan.breakfast,plan.lunch,plan.dinner,plan.snack].forEach(s=>{
    if(!s)return;
    let m=s.match(/(早餐|午餐|晚餐|加餐)[A-E]/);
    if(m)codes.push(m[0]);
  });
  if(codes.length===0){document.getElementById('mealPlanList').innerHTML='<p class="text-sm">无饮食计划</p>';return;}
  document.getElementById('mealPlanList').innerHTML=codes.map(code=>{
    let meal=MEAL_PLANS.find(m=>m.code===code);
    if(!meal)return'';
    let td=getData(currentDate).today;
    let added=td.meals.some(m=>m.code===code);
    return '<div class="meal-plan-card"><div class="meal-plan-info"><div class="meal-plan-name">'+meal.code+' '+meal.name+'</div><div class="meal-plan-detail">'+meal.info+' | '+meal.ingredients+'</div></div>'+
      (added?'<span style="color:var(--green);font-size:0.8rem">\u2713</span>':'<button class="btn btn-sm btn-primary" onclick="syncMealFromPlan(\''+code.startsWith('早餐')?'早餐':code.startsWith('午餐')?'午餐':code.startsWith('晚餐')?'晚餐':'加餐'+'\',\''+code+'\');renderAll()">+</button>')+
      '</div>';
  }).join('');
}

// Food search
function initFoodSearch(){
  let fs=document.getElementById('foodSearch'),fss=document.getElementById('foodSuggestions');
  if(!fs)return;
  fs.addEventListener('input',()=>{
    let q=fs.value.trim().toLowerCase();
    if(!q){fss.classList.remove('show');return;}
    let matches=FOOD_DB.filter(f=>f.name.toLowerCase().includes(q)).slice(0,8);
    fss.innerHTML=matches.length===0?'<div class="food-suggestion-item" style="color:var(--text2)">未找到</div>':matches.map(f=>'<div class="food-suggestion-item" data-name="'+f.name+'"><span>'+f.name+'</span><span class="kcal-hint">'+f.kcal+' kcal/100g</span></div>').join('');
    fss.classList.add('show');
  });
  fss.addEventListener('click',e=>{
    let item=e.target.closest('.food-suggestion-item');
    if(item&&item.dataset.name){fs.value=item.dataset.name;fss.classList.remove('show');}
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.food-search-wrap'))fss.classList.remove('show');});
}

function addFood(){
  let name=document.getElementById('foodSearch').value.trim();
  let weight=parseFloat(document.getElementById('foodWeight').value)||100;
  let mealType=document.getElementById('mealType').value;
  if(!name)return;
  let found=FOOD_DB.find(f=>f.name===name);
  let ratio=weight/100;
  let td=getData(currentDate).today;
  td.meals.push({id:Date.now(),name,weight,mealType,kcal:found?Math.round(found.kcal*ratio):0,protein:found?+(found.p*ratio).toFixed(1):0,carb:found?+(found.c*ratio).toFixed(1):0,fat:found?+(found.f*ratio).toFixed(1):0,isCustom:!found});
  saveData(currentDate,td);
  document.getElementById('foodSearch').value='';document.getElementById('foodWeight').value='100';
  renderAll();
}

function deleteMeal(id){
  let td=getData(currentDate).today;
  td.meals=td.meals.filter(m=>m.id!==id);
  saveData(currentDate,td);
  renderAll();
}

function renderMeals(){
  let td=getData(currentDate).today;
  let totalKcal=0,totalP=0,totalC=0,totalF=0;
  let container=document.getElementById('todayMeals');
  if(td.meals.length===0){container.innerHTML='<div class="empty-state">\uD83C\uDF7D\uFE0F 今日无饮食记录</div>';}
  else{container.innerHTML=td.meals.map(m=>{totalKcal+=m.kcal;totalP+=m.protein;totalC+=m.carb;totalF+=m.fat;
    let macro='';if(m.protein)macro+='<span class="p">P'+m.protein+'g</span> ';if(m.carb)macro+='<span class="c">C'+m.carb+'g</span> ';if(m.fat)macro+='<span class="f">F'+m.fat+'g</span>';
    return '<div class="meal-plan-card"><div class="meal-plan-info"><div class="meal-plan-name">'+m.name+(m.isCustom?' <span style="color:var(--text2);font-size:0.7rem">(自定义)</span>':'')+'</div><div class="meal-plan-detail">'+m.mealType+' '+(m.isPlanMeal?'1份':m.weight+'g')+' <span class="macro-inline">'+macro+'</span></div></div><div class="meal-plan-kcal">'+m.kcal+' kcal</div><button class="btn btn-sm btn-danger" onclick="deleteMeal('+m.id+')">\u2715</button></div>';
  }).join('');}
  
  let burn=getTotalBurn();
  document.getElementById('statKcal').textContent=totalKcal;
  document.getElementById('statBurn').textContent=burn;
  let deficit=totalKcal-burn;
  let defEl=document.getElementById('statDeficit');
  defEl.textContent=(deficit>=0?'+':'')+deficit;
  defEl.style.color=deficit>0?'var(--accent)':'var(--green)';
  document.getElementById('statProtein').textContent=totalP.toFixed(1)+'g';
}


// =========== WORKOUTS ===========
function renderWorkoutPlans(){
  let plan=DAILY_PLANS[currentDate];
  let container=document.getElementById('workoutPlanList');
  if(!plan){container.innerHTML='';return;}
  let plans=[];
  if(plan.morning_run_plan&&plan.morning_run_plan!=='休息'&&plan.morning_run_plan!==''){
    plans.push({name:plan.morning_run_plan,desc:plan.morning_detail,type:'run'});
  }
  let ev=plan.evening_workout_plan||'';
  if(ev&&!ev.includes('休息')&&ev!==''){
    let wo=WORKOUT_PLANS.find(w=>ev.includes(w.name));
    plans.push({name:ev,desc:wo?wo.content+' ('+wo.note+')':'',type:'workout'});
  }
  if(plans.length===0){container.innerHTML='<p class="text-sm">无训练计划</p>';return;}
  container.innerHTML=plans.map(p=>{
    let td=getData(currentDate).today;
    let added=td.workouts.some(w=>w.name===p.name);
    return '<div class="meal-plan-card"><div class="meal-plan-info"><div class="meal-plan-name">'+(p.type==='run'?'\uD83C\uDF05 ':'\uD83C\uDFCB\uFE0F ')+p.name+'</div>'+(p.desc?'<div class="meal-plan-detail">'+p.desc+'</div>':'')+'</div>'+
      (added?'<span style="color:var(--green);font-size:0.8rem">\u2713</span>':'<button class="btn btn-sm btn-primary" onclick="syncWorkoutFromPlan(\''+p.name.replace(/'/g,"\\'")+'\');renderAll()">+</button>')+
      '</div>';
  }).join('');
}

function updateExerciseList(){
  let cat=document.getElementById('workoutCategory').value;
  let list=EXERCISE_DB[cat]||[];
  document.getElementById('exList').innerHTML=list.map(e=>'<option value="'+e+'">').join('');
  if(cat==='有氧'){document.getElementById('strengthFields').style.display='none';document.getElementById('cardioFields').style.display='block';}
  else{document.getElementById('strengthFields').style.display='grid';document.getElementById('cardioFields').style.display='none';}
}
document.getElementById('workoutCategory').addEventListener('change',updateExerciseList);

function addWorkout(){
  let name=document.getElementById('workoutExName').value.trim();
  let cat=document.getElementById('workoutCategory').value;
  if(!name)return;
  let isCardio=cat==='有氧';
  let duration=isCardio?(parseInt(document.getElementById('workoutDuration').value)||0):null;
  let manualBurn=parseInt(document.getElementById('workoutCalBurn').value)||0;
  
  // Auto-estimate calorie burn
  let calBurn=manualBurn;
  if(!calBurn&&duration>0){
    let rate=CAL_BURN_RATE[name]||CAL_BURN_RATE['力量训练']||4.5;
    let weight=68;
    let td=getData(currentDate).today;
    if(td.body&&td.body.weight)weight=td.body.weight;
    calBurn=Math.round(rate*weight*duration/60);
  }else if(!calBurn){
    // Default: 30 min estimate
    let rate=CAL_BURN_RATE[name]||CAL_BURN_RATE['力量训练']||4.5;
    let weight=68;
    let td=getData(currentDate).today;
    if(td.body&&td.body.weight)weight=td.body.weight;
    calBurn=Math.round(rate*weight*0.5);
  }
  
  let td=getData(currentDate).today;
  td.workouts.push({
    id:Date.now(),name,category:cat,
    sets:isCardio?null:(parseInt(document.getElementById('workoutSets').value)||0),
    reps:isCardio?null:(parseInt(document.getElementById('workoutReps').value)||0),
    weight:isCardio?null:(parseFloat(document.getElementById('workoutWeight').value)||0),
    duration,distance:isCardio?(parseFloat(document.getElementById('workoutDistance').value)||0):null,
    note:document.getElementById('workoutNote').value.trim(),
    calBurn,manualBurn:!!manualBurn
  });
  saveData(currentDate,td);
  ['workoutExName','workoutSets','workoutReps','workoutWeight','workoutDuration','workoutDistance','workoutNote','workoutCalBurn'].forEach(id=>document.getElementById(id).value='');
  renderAll();
}

function deleteWorkout(id){
  let td=getData(currentDate).today;
  td.workouts=td.workouts.filter(w=>w.id!==id);
  saveData(currentDate,td);
  renderAll();
}

function renderWorkouts(){
  let td=getData(currentDate).today;
  let container=document.getElementById('todayWorkouts');
  if(td.workouts.length===0){container.innerHTML='<div class="empty-state">\uD83C\uDFCB\uFE0F 今日无训练</div>';}
  else{container.innerHTML=td.workouts.map(w=>{
    let detail=w.category;let burn=calcWorkoutBurn(w);
    if(w.sets)detail+=' '+w.sets+'\u7EC4x'+w.reps+'\u6B21';
    if(w.weight>0)detail+=' '+w.weight+'kg';
    if(w.duration)detail+=' '+w.duration+'\u5206';
    if(w.distance>0)detail+=' '+w.distance+'km';
    if(w.note)detail+=' '+w.note;
    detail+=' \u00B7 \uD83D\uDD25'+burn+'kcal';
    return '<div class="meal-plan-card"><div class="meal-plan-info"><div class="meal-plan-name">'+w.name+'</div><div class="meal-plan-detail">'+detail+'</div></div><button class="btn btn-sm btn-danger" onclick="deleteWorkout('+w.id+')">\u2715</button></div>';
  }).join('');}
}

// =========== BODY DATA ===========
document.getElementById('bodyKnee').addEventListener('input',function(){document.getElementById('kneeVal').textContent=this.value;});
function addBodyData(){
  let w=parseFloat(document.getElementById('bodyWeight').value);
  if(!w)return;
  let td=getData(currentDate).today;
  td.body={weight:w,fat:parseFloat(document.getElementById('bodyFat').value)||null,waist:parseFloat(document.getElementById('bodyWaist').value)||null,pulse:parseInt(document.getElementById('bodyPulse').value)||null,sleep:parseFloat(document.getElementById('bodySleep').value)||null,water:parseFloat(document.getElementById('bodyWater').value)||null,knee:parseInt(document.getElementById('bodyKnee').value)||10,time:new Date().toISOString()};
  saveData(currentDate,td);
  ['bodyWeight','bodyFat','bodyWaist','bodyPulse','bodySleep','bodyWater'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('bodyKnee').value=10;document.getElementById('kneeVal').textContent='10';
  renderBodyHistory();
}
function renderBodyHistory(){
  let d=load();
  let entries=Object.entries(d).filter(([dt,dd])=>dd.body&&dd.body.weight).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10);
  let container=document.getElementById('bodyHistory');
  if(entries.length===0){container.innerHTML='';return;}
  container.innerHTML='<div class="card mt-12"><div class="card-header"><span class="card-title">\uD83D\uDCC8 最近记录</span></div>'+entries.map(([date,dd])=>{
    let b=dd.body;let parts=['体重 <strong>'+b.weight+'kg</strong>'];
    if(b.fat)parts.push('体脂 '+b.fat+'%');if(b.waist)parts.push('腰围 '+b.waist+'cm');
    if(b.sleep)parts.push('睡眠 '+b.sleep+'h');if(b.water)parts.push('饮水 '+b.water+'L');
    if(b.pulse)parts.push('晨脉 '+b.pulse);if(b.knee!=null)parts.push('膝盖 '+b.knee+'/10');
    return '<div class="history-item"><div class="history-date">'+date+'</div><div class="history-summary">'+parts.join(' \u00B7 ')+'</div></div>';
  }).join('')+'</div>';
}

// =========== HISTORY ===========
function renderHistory(){
  let d=load();let dates=Object.keys(d).sort().reverse().slice(0,30);
  let container=document.getElementById('historyList');
  if(dates.length===0){container.innerHTML='<div class="empty-state">\uD83D\uDCCA 暂无记录</div>';return;}
  container.innerHTML=dates.map(date=>{
    let dd=d[date];let totalKcal=dd.meals?dd.meals.reduce((s,m)=>s+m.kcal,0):0;
    let totalBurn=dd.workouts?dd.workouts.reduce((s,w)=>{
      if(w.calBurn)return s+w.calBurn;let rate=CAL_BURN_RATE[w.name]||CAL_BURN_RATE['力量训练']||4.5;
      let bw=dd.body&&dd.body.weight?dd.body.weight:68;let dur=w.duration||30;
      return s+Math.round(rate*bw*dur/60);
    },0):0;
    let woCount=dd.workouts?dd.workouts.length:0;
    let checks=dd.checks||{};let checkDone=Object.values(checks).filter(v=>v===true).length;
    let checkTotal=Object.keys(checks).length;
    let summary=[];
    if(checkTotal>0)summary.push('\u2705 '+checkDone+'/'+checkTotal);
    if(totalKcal>0)summary.push('\uD83C\uDF7D '+totalKcal+'kcal');
    if(totalBurn>0)summary.push('\uD83D\uDD25 '+totalBurn+'kcal');
    if(dd.body&&dd.body.weight)summary.push('\u2696 '+dd.body.weight+'kg');
    let isToday=date===getToday();
    return '<div class="history-item" style="border-left-color:'+(isToday?'var(--accent)':'var(--border)')+'"><div class="history-date">'+date+(isToday?' <span style="color:var(--accent);font-weight:600">(\u4ECA\u5929)</span>':'')+'</div><div class="history-summary">'+(summary.join(' \u00B7 ')||'\u65E0\u8BB0\u5F55')+'</div></div>';
  }).join('');
}

// =========== SUMMARY ===========
function updateSummary(){
  let td=getData(currentDate).today;
  let kcal=td.meals.reduce((s,m)=>s+m.kcal,0);
  let burn=getTotalBurn();let deficit=kcal-burn;
  let checks=td.checks||{};let done=Object.values(checks).filter(v=>v===true).length;
  let total=Object.keys(checks).length;
  done+=(td.customChecks||[]).filter(c=>c.done).length;total+=(td.customChecks||[]).length;
  document.getElementById('summaryContent').innerHTML='<strong>'+kcal+' kcal</strong> \u00B7 \uD83D\uDD25'+burn+' '+(deficit>=0?'<span style="color:var(--accent)">+'+deficit+'</span>':'<span style="color:var(--green)">'+deficit+'</span>')+'kcal \u00B7 '+done+'/'+total;
}

// =========== EXPORT/IMPORT ===========
function exportData(){
  let data=JSON.stringify(load(),null,2);
  let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download='checkin_backup_'+getToday()+'.json';a.click();
}
function showImport(){document.getElementById('importModal').classList.add('show');}
function hideImport(){document.getElementById('importModal').classList.remove('show');document.getElementById('importData').value='';}
function doImport(){
  try{let imported=JSON.parse(document.getElementById('importData').value);if(typeof imported!=='object')throw new Error();
    save({...load(),...imported});hideImport();renderAll();}
  catch(e){alert('导入失败：数据格式不正确');}
}
document.getElementById('importModal').addEventListener('click',e=>{if(e.target===e.currentTarget)hideImport();});

// =========== INIT ===========
initFoodSearch();updateExerciseList();renderAll();
</script>
